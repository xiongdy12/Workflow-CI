name: MLflow CI - Retrain & Dockerize

on:
  push:
    branches: [main]
    paths:
      - "MLProject/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  retrain-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MLProject
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.16.2 pandas numpy scikit-learn

      - name: Run MLflow Project (retrain)
        run: |
          mlflow run . --env-manager=local
          echo "RUN_ID=$(ls -td mlruns/0/*/ | head -1 | xargs basename)" >> "$GITHUB_ENV"

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model
          path: MLProject/mlruns/0/${{ env.RUN_ID }}/artifacts/model/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          mlflow models build-docker \
            -m "runs:/${{ env.RUN_ID }}/model" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-msml:latest"

      - name: Push image to Docker Hub
        run: docker push "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-msml:latest"
